name: Lint
# Super-Linter https://github.com/github/super-linter

on:
  workflow_call:
    secrets:
      token:
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  VENV_DIR: /home/runner/work/_temp/_github_workflow

jobs:
  lint:
    name: Lint Code Base
    runs-on: ubuntu-latest
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🐧 This job is now running on a ${{ runner.os }} server hosted by GitHub!"
      - run: echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."
      - run: echo "📂 Working folder is ${{github.workspace}}"

      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          # super-linter needs the full git history to get the
          # list of files that changed across commits
          fetch-depth: 0
          persist-credentials: false

      - name: Install dependencies with pip + requirements.txt
        shell: bash
        run: pip install -r requirements.txt

      - name: Lint Code Base
        uses: super-linter/super-linter@v8.6.0
        env:
          VALIDATE_GITHUB_ACTIONS: true
          VALIDATE_ALL_CODEBASE: false
          VALIDATE_PYTHON_FLAKE8: true
          PYTHON_FLAKE8_CONFIG_FILE: ${{github.workspace}}/.github/linters/flake8
          VALIDATE_PYTHON_PYLINT: true
          PYTHON_PYLINT_CONFIG_FILE: ${{github.workspace}}/.github/linters/pylint.toml
          VALIDATE_JSON: true
          VALIDATE_MARKDOWN: true
          MARKDOWN_CONFIG_FILE: ${{github.workspace}}/.github/linters/markdown-link-check.json
          VALIDATE_NATURAL_LANGUAGE: true
          VALIDATE_YAML: true
          YAML_CONFIG_FILE: ${{github.workspace}}/.github/linters/yaml-lint.yml
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.token }}

# ~@:-]
